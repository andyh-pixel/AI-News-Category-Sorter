<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

 <!-- Chart.js for graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-dark bg-primary shadow">
    <div class="container d-flex justify-content-between">

        <!-- Logo -->
        <a href="index.html" class="navbar-brand fw-bold text-white text-decoration-none">
            📰 AI News Category Sorter
        </a>

        <!-- Navigation Links -->
        <div>
            <a href="index.html" class="text-white text-decoration-none me-4">
                Home
            </a>
            <a href="results.html" class="text-white text-decoration-none">
                Results
            </a>
        </div>

    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Classification Results
    </h1>

    <!-- Stats -->

    <div class="row justify-content-center g-4">

        <div class="col-md-4">
            <div class="stats-card">
                <h5>Total Articles</h5>
                <h2 id="totalArticlesDisplay">Loading...</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h5>Model A Accuracy</h5>
                <h2 id="modelAAccuracyDisplay">Loading...</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card">
                <h5>Model B Accuracy</h5>
                <h2 id="modelBAccuracyDisplay">Loading...</h2>
            </div>
        </div>

    </div>

    <!-- Graph -->

    <div class="chart-container mt-5">

        <h3 class="text-center mb-4">
            News Category Distribution
        </h3>

        <canvas id="pieChart"></canvas>

    </div>

    <!-- Table -->

    <div class="table-responsive mt-5">

        <table class="table table-striped">

            <thead class="table-primary">

            <tr>
                <th>Category</th>
                <th>Total Articles</th>
                <th>Model A Accuracy</th>
                <th>Model B Accuracy</th>
            </tr>

            </thead>

            <tbody id="categoryTableBody">

            <tr><td colspan="4" class="text-center">Loading data...</td></tr>
            </tbody>

        </table>

    </div>

    <div class="text-center mt-5 mb-5">

        <a href="index.html" class="btn btn-outline-primary btn-lg ms-3">
            Upload Another File
        </a>

    </div>

</div>


<script>
    async function loadResults(){


        try {
            const response = await fetch('/results-data');
            const data = await response.json(); 

            if (response.ok){
                document.getElementById('totalArticlesDisplay').innerText = data.totalArticles;
                document.getElementById('modelAAccuracyDisplay').innerText = data.classifierAAccuracy.toFixed(1) + "%";
                document.getElementById('modelBAccuracyDisplay').innerText = data.classifierBAccuracy.toFixed(1) + "%";

                const tableBody = document.getElementById('categoryTableBody');
                tableBody.innerHTML = "";

                const labels = [];
                const chartData = [];

                for (const [category, stats] of Object.entries(data.categoryDistribution)) {
                    const row = 
                    `<tr>
                        <td>${category}</td>
                        <td>${stats.articles}</td>
                        <td>${stats.classifierA.toFixed(1)}%</td>
                        <td>${stats.classifierB.toFixed(1)}%</td>
                    </tr>`;

                    tableBody.innerHTML += row;

                    labels.push(category);
                    chartData.push(stats.articles);

                }

                const context = document.getElementById('pieChart').getContext('2d');
                new Chart(context, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: chartData,
                            backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545'],
                        }]
                    }
                });

                }
                else {

                    console.error("Server returned an error: ", data.error );
                }

            }

            catch (error){
                console.error ("Failed to fetch results data: ", error);
            }
        }

        window.onload = loadResults;

</script>

</body>
</html>
